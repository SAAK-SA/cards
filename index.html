<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SAAK International</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans Arabic', sans-serif; background: #e8e8e8; }
.page { display: none; }
.page.active { display: block; }
.vcard-container { max-width: 450px; margin: 0 auto; padding: 16px; direction: ltr; }
.vcard { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.vcard-top { background: linear-gradient(135deg, #1a3a6b 0%, #234876 30%, #2e6c6e 60%, #3a8f6b 100%); padding: 40px 25px 0; text-align: center; color: white; }
.vcard-initials { width: 130px; height: 130px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; color: white; font-size: 42px; font-weight: 700; margin: 0 auto 20px; }
.vcard-name { font-size: 26px; font-weight: 700; letter-spacing: 1.5px; margin-bottom: 8px; text-transform: uppercase; }
.vcard-pos { font-size: 13px; letter-spacing: 3px; font-weight: 300; text-transform: uppercase; margin-bottom: 30px; opacity: 0.95; }
.vcard-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid rgba(255,255,255,0.25); }
.vcard-action { padding: 18px 8px; text-align: center; text-decoration: none; color: white; border-right: 1px solid rgba(255,255,255,0.25); }
.vcard-action:last-child { border-right: none; }
.vcard-action svg { width: 28px; height: 28px; stroke: white; stroke-width: 2; fill: none; pointer-events: none; }
.vcard-action span { display: block; font-size: 12px; letter-spacing: 2px; margin-top: 8px; pointer-events: none; }
.vcard-bottom { background: #f5f5f5; padding: 25px 20px; }
.vcard-info { background: #eee; border-radius: 18px; padding: 25px 20px; }
.info-row { display: flex; align-items: center; gap: 18px; padding: 14px 0; }
.info-row.addr { align-items: flex-start; }
.info-sep { height: 1px; background: linear-gradient(to right, transparent, #04875D 20%, #04875D 80%, transparent); opacity: 0.4; }
.info-icon { width: 30px; height: 30px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.info-icon svg { width: 28px; height: 28px; fill: #04875D; }
.info-icon svg.si { fill: none; stroke: #04875D; stroke-width: 2; }
.info-txt { flex: 1; color: #193D71; font-weight: 700; font-size: 14px; }
.info-txt a { color: #193D71; text-decoration: none; }
.show-map { color: #04875D !important; font-weight: 700; font-size: 13px; margin-top: 8px; display: inline-block; text-decoration: none; }
.save-btn { display: flex; align-items: center; justify-content: center; gap: 12px; background: linear-gradient(135deg, #1a3a6b 0%, #234876 30%, #2e6c6e 60%, #3a8f6b 100%); color: white; padding: 18px 20px; border-radius: 14px; margin: 20px 0 15px; font-weight: 700; font-size: 15px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border: none; width: 100%; }
.save-btn svg { width: 24px; height: 24px; fill: white; }
.vcard-logo { text-align: center; padding: 15px 0 10px; }
.vcard-logo img { max-width: 220px; }
.status-box { max-width: 450px; margin: 100px auto; padding: 40px 20px; text-align: center; background: white; border-radius: 16px; }
.spinner { width: 50px; height: 50px; border: 4px solid #e5e7eb; border-top: 4px solid #04875D; border-radius: 50%; margin: 0 auto 20px; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.debug { background: #fff3cd; color: #856404; padding: 15px; margin: 20px auto; max-width: 450px; border-radius: 8px; font-size: 12px; text-align: left; direction: ltr; word-break: break-all; font-family: monospace; }
</style>
</head>

// === حط رابط Google Sheets هنا (بيانات الموظفين) ===
var SHEETS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS8S1szszQ0TA8pOFXkorshMroYiUnBSTg53_969AE3oF1UpqG1iMUdg5MWQH4EDRJh5L4e8K4EbW_d/pub?gid=0&single=true&output=csv";
// ====================================================

function parseCSV(line) {
    var r=[],c='',q=false;
    for(var i=0;i<line.length;i++){var ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}
    r.push(c);return r.map(function(v){return v.trim();});
}

async function fetchSheets(id) {
    if(!SHEETS_URL) return {error: 'SHEETS_URL فاضي - ما حطيت الرابط'};
    try {
        var r = await fetch(SHEETS_URL + (SHEETS_URL.indexOf('?')>-1?'&':'?') + 't=' + Date.now());
        if(!r.ok) return {error: 'HTTP error: ' + r.status};
        var csv = await r.text();
        if (!csv || csv.length < 10) return {error: 'Sheet فاضي أو رابط خطأ'};
        var lines = csv.split(/\r?\n/).filter(function(l){return l.trim();});
        if(lines.length<2) return {error: 'لا يوجد بيانات في الشيت'};
        var h = parseCSV(lines[0]).map(function(x){return x.toLowerCase().trim();});
        var ii=h.indexOf('id'),ni=h.indexOf('name'),pi=h.indexOf('position'),phi=h.indexOf('phone'),ei=h.indexOf('email');
        if(ii===-1) return {error: 'عمود id غير موجود. الأعمدة الموجودة: ' + h.join(', ')};
        for(var i=1;i<lines.length;i++){
            var c=parseCSV(lines[i]);
            if(String(c[ii]).trim()===String(id).trim()) {
                return {data: {id:c[ii],name:c[ni]||'',position:c[pi]||'',phone:c[phi]||'',email:c[ei]||''}};
            }
        }
        return {error: 'الموظف "' + id + '" غير موجود في الشيت. عدد الموظفين: ' + (lines.length-1)};
    } catch(e){
        return {error: 'خطأ في الاتصال: ' + e.message};
    }
}

function showPage(id){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});document.getElementById(id).classList.add('active');}

function getInitials(n){if(!n)return'?';var p=n.trim().split(/\s+/);return p.length===1?p[0].substring(0,2).toUpperCase():(p[0][0]+p[p.length-1][0]).toUpperCase();}

function downloadVCard(emp) {
    var np=emp.name.trim().split(/\s+/),ln=np.length>1?np[np.length-1]:'',fn=np.length>1?np.slice(0,-1).join(' '):np[0];

async function init() {
    var p = new URLSearchParams(window.location.search);
    var empId = p.get('id');
    if (!empId) { showPage('notFoundPage'); document.getElementById('debugBox').textContent = 'لا يوجد id في الرابط'; return; }

    var result = await fetchSheets(empId);

    if (result.data) {
        showVCard(result.data);
    } else {
        showPage('notFoundPage');
        document.getElementById('debugBox').innerHTML = '<strong>Debug:</strong><br>ID: ' + empId + '<br>SHEETS_URL: ' + (SHEETS_URL ? SHEETS_URL.substring(0,60)+'...' : 'EMPTY') + '<br>Error: ' + (result.error || 'unknown');
    }
}

init();
